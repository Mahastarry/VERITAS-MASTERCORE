<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VERITAS MASTERCORE — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8F9FA; }
    .font-grotesk { font-family: 'Space Grotesk', sans-serif; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Pendo Agent (snippet provided by Pendo during install) -->
  <!-- Tracking utilities — must load before Alpine components -->
  <script src="js/pendo-tracking.js"></script>
  <script src="js/case-registry.js"></script>
  <script src="js/export-engine.js"></script>
  <script src="js/search-filter.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <!-- ============================================================ -->
  <!-- Header                                                        -->
  <!-- ============================================================ -->
  <header class="bg-white border-b border-black/[0.06] px-8 py-4 flex items-center justify-between">
    <h1 class="font-grotesk text-lg font-semibold text-gray-900">VERITAS MASTERCORE</h1>
    <button @click="localStorage.removeItem('access_token'); window.location.href='/login.html'"
            class="text-xs text-gray-500 hover:text-gray-900">Sign Out</button>
  </header>

  <div class="max-w-7xl mx-auto px-8 py-8" x-data="{ registryOpen: false, editingCase: null }" x-init="$store.cases.fetchCases()">

    <!-- ============================================================ -->
    <!-- Toolbar: Search, Filters, Export Actions                      -->
    <!-- ============================================================ -->
    <section class="flex flex-wrap items-center gap-4 mb-6" x-data="searchFilter">

      <!-- Real-time search -->
      <input type="text" x-model="searchQuery" @input="onSearchInput()"
             placeholder="Search cases…"
             class="flex-1 min-w-[240px] border border-black/[0.06] rounded-lg px-3.5 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10" />

      <!-- Advanced filter toggle -->
      <button @click="filterPanelOpen = !filterPanelOpen"
              class="text-sm border border-black/[0.06] rounded-lg px-4 py-2 hover:bg-gray-50">
        Advanced Filters
      </button>

      <!-- New case button -->
      <button @click="registryOpen = true; editingCase = null"
              class="bg-gray-900 text-white text-sm font-medium rounded-lg px-4 py-2 hover:bg-gray-800">
        + Register Case
      </button>

      <!-- Advanced filter panel (slide-down) -->
      <div x-show="filterPanelOpen" x-transition
           class="w-full bg-white border border-black/[0.06] rounded-lg p-5 grid grid-cols-2 md:grid-cols-4 gap-4">

        <div>
          <label class="block text-xs text-gray-500 mb-1">Filing Year</label>
          <input type="text" x-model="filingYearFilter"
                 class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Category</label>
          <input type="text" x-model="categoryFilter"
                 class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Forum</label>
          <input type="text" x-model="forumFilter"
                 class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Status</label>
          <input type="text" x-model="statusFilter"
                 class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
        </div>

        <div class="col-span-full flex gap-3">
          <button @click="applyAdvancedFilters()"
                  class="bg-gray-900 text-white text-xs font-medium rounded-lg px-4 py-2 hover:bg-gray-800">
            Apply Filters
          </button>
          <button @click="clearFilters()"
                  class="text-xs border border-black/[0.06] rounded-lg px-4 py-2 hover:bg-gray-50">
            Clear
          </button>
        </div>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- Export toolbar                                                -->
    <!-- ============================================================ -->
    <section class="flex flex-wrap items-center gap-3 mb-6" x-data="exportEngine">

      <button @click="exportBatch()"
              :disabled="selectedIds.length === 0"
              class="text-xs border border-black/[0.06] rounded-lg px-4 py-2 hover:bg-gray-50 disabled:opacity-40">
        Export Selected (<span x-text="selectedIds.length"></span>)
      </button>

      <button @click="exportFilteredResults($store.cases.items, '', '')"
              class="text-xs border border-black/[0.06] rounded-lg px-4 py-2 hover:bg-gray-50">
        Export Visible
      </button>

      <button @click="parametricPanelOpen = !parametricPanelOpen"
              class="text-xs border border-black/[0.06] rounded-lg px-4 py-2 hover:bg-gray-50">
        Parametric Export
      </button>

      <!-- Parametric slide-out tray -->
      <div x-show="parametricPanelOpen" x-transition
           class="fixed inset-y-0 right-0 w-80 bg-white shadow-xl border-l border-black/[0.06] p-6 z-50 overflow-y-auto">

        <div class="flex items-center justify-between mb-6">
          <h2 class="font-grotesk text-sm font-semibold">Parametric Matrix Panel</h2>
          <button @click="parametricPanelOpen = false" class="text-gray-400 hover:text-gray-900">&times;</button>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-xs text-gray-500 mb-1">Filing Year</label>
            <input type="text" x-model="filingYearFilter"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Category</label>
            <input type="text" x-model="categoryFilter"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Forum</label>
            <input type="text" x-model="forumFilter"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Assignment State</label>
            <input type="text" x-model="assignmentStateFilter"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>

          <button @click="exportParametric()"
                  class="w-full bg-gray-900 text-white text-xs font-medium rounded-lg py-2.5 hover:bg-gray-800">
            Download Data Block
          </button>
        </div>
      </div>
    </section>

    <!-- ============================================================ -->
    <!-- Case Ledger Table                                            -->
    <!-- ============================================================ -->
    <div class="bg-white rounded-xl border border-black/[0.06] overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50/60 border-b border-black/[0.06]">
          <tr class="text-left text-xs text-gray-500 font-medium">
            <th class="px-4 py-3 w-8">
              <input type="checkbox" />
            </th>
            <th class="px-4 py-3">Case Index</th>
            <th class="px-4 py-3">Forum</th>
            <th class="px-4 py-3">Type</th>
            <th class="px-4 py-3">Petitioner</th>
            <th class="px-4 py-3">Status</th>
            <th class="px-4 py-3">Year</th>
            <th class="px-4 py-3 text-right">Actions</th>
          </tr>
        </thead>
        <tbody x-data="exportEngine">
          <template x-for="caseItem in $store.cases.items" :key="caseItem.id">
            <tr class="border-b border-black/[0.06] hover:bg-gray-50/40">
              <td class="px-4 py-3">
                <input type="checkbox"
                       :checked="selectedIds.includes(caseItem.id)"
                       @change="toggleSelection(caseItem.id)" />
              </td>
              <td class="px-4 py-3 font-grotesk" x-text="caseItem.case_index_no"></td>
              <td class="px-4 py-3" x-text="caseItem.judicial_forum"></td>
              <td class="px-4 py-3" x-text="caseItem.writ_case_type"></td>
              <td class="px-4 py-3" x-text="caseItem.petitioner_name"></td>
              <td class="px-4 py-3">
                <span class="inline-block bg-gray-100 text-gray-700 text-xs px-2 py-0.5 rounded"
                      x-text="caseItem.case_status"></span>
              </td>
              <td class="px-4 py-3 font-grotesk" x-text="caseItem.filing_year_target"></td>
              <td class="px-4 py-3 text-right space-x-2">
                <button @click="editingCase = caseItem; registryOpen = true"
                        class="text-xs text-gray-500 hover:text-gray-900">Edit</button>
                <button @click="exportSingleCase(caseItem)"
                        class="text-xs text-gray-500 hover:text-gray-900">Export</button>
                <button @click="if(confirm('Delete this case?')) $store.cases.deleteCase(caseItem)"
                        class="text-xs text-red-500 hover:text-red-700">Delete</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- ============================================================ -->
    <!-- 12-Parameter Data Registry Modal                             -->
    <!-- ============================================================ -->
    <div x-show="registryOpen" x-transition
         class="fixed inset-0 bg-black/30 flex items-center justify-center z-50">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-8"
           @click.outside="registryOpen = false"
           x-data="{
             form: {
               case_index_no: '',
               judicial_forum: '',
               writ_case_type: '',
               filing_year_target: '',
               petitioner_name: '',
               respondent_name: '',
               advocate_on_record: '',
               classification_category: '',
               case_status: 'Pending',
               keywords: '',
               filing_date_start: '',
               filing_date_end: '',
               hearing_date_start: '',
               hearing_date_end: ''
             },
             init() {
               if (editingCase) {
                 this.form = { ...editingCase, keywords: (editingCase.keywords || []).join(', ') };
               }
             },
             async submit() {
               var payload = { ...this.form, keywords: this.form.keywords.split(',').map(k => k.trim()).filter(Boolean) };
               if (editingCase) {
                 await $store.cases.updateCase(editingCase.id, editingCase, payload);
               } else {
                 await $store.cases.registerCase(payload);
               }
               registryOpen = false;
             }
           }">

        <h2 class="font-grotesk text-lg font-semibold text-gray-900 mb-6"
            x-text="editingCase ? 'Edit Case Record' : '12-Parameter Data Registry'"></h2>

        <form @submit.prevent="submit()" class="grid grid-cols-2 gap-4">
          <!-- Core Identifiers -->
          <div>
            <label class="block text-xs text-gray-500 mb-1">Case Index No</label>
            <input type="text" x-model="form.case_index_no" required
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Judicial Forum</label>
            <input type="text" x-model="form.judicial_forum" required
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Writ/Case Type</label>
            <input type="text" x-model="form.writ_case_type"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Filing Year Target</label>
            <input type="text" x-model="form.filing_year_target"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>

          <!-- Parties & Counsel -->
          <div>
            <label class="block text-xs text-gray-500 mb-1">Petitioner Party Name</label>
            <input type="text" x-model="form.petitioner_name"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Respondent Party Name</label>
            <input type="text" x-model="form.respondent_name"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div class="col-span-2">
            <label class="block text-xs text-gray-500 mb-1">Advocate on Record</label>
            <input type="text" x-model="form.advocate_on_record"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>

          <!-- Metadata & Lifecycles -->
          <div>
            <label class="block text-xs text-gray-500 mb-1">Classification Category</label>
            <input type="text" x-model="form.classification_category"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Current Case Status</label>
            <select x-model="form.case_status"
                    class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm">
              <option>Pending</option>
              <option>Active</option>
              <option>Disposed</option>
              <option>Adjourned</option>
              <option>Closed</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="block text-xs text-gray-500 mb-1">Keywords (comma-separated)</label>
            <input type="text" x-model="form.keywords"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>

          <!-- Chronological Ranges -->
          <div>
            <label class="block text-xs text-gray-500 mb-1">Filing Date — Start</label>
            <input type="date" x-model="form.filing_date_start"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Filing Date — End</label>
            <input type="date" x-model="form.filing_date_end"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Hearing Range — Start</label>
            <input type="date" x-model="form.hearing_date_start"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Hearing Range — End</label>
            <input type="date" x-model="form.hearing_date_end"
                   class="w-full border border-black/[0.06] rounded px-2.5 py-1.5 text-sm" />
          </div>

          <div class="col-span-2 flex justify-end gap-3 mt-4">
            <button type="button" @click="registryOpen = false"
                    class="text-sm border border-black/[0.06] rounded-lg px-4 py-2 hover:bg-gray-50">
              Cancel
            </button>
            <button type="submit"
                    class="bg-gray-900 text-white text-sm font-medium rounded-lg px-6 py-2 hover:bg-gray-800">
              <span x-text="editingCase ? 'Update Record' : 'Register Case'"></span>
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>

</body>
</html>
