<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VERITAS MASTERCORE — Authorization</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8F9FA; }
    .font-grotesk { font-family: 'Space Grotesk', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">

  <!-- Pendo Agent (snippet provided by Pendo during install) -->
  <!-- pendo-tracking.js provides the track-event wrapper functions -->
  <script src="js/pendo-tracking.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="js/auth.js"></script>

  <main class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-black/[0.06] p-10"
        x-data="authForm">

    <h1 class="font-grotesk text-2xl font-semibold text-gray-900 mb-1">
      VERITAS MASTERCORE
    </h1>
    <p class="text-sm text-gray-500 mb-8">Unified System Authorization</p>

    <form @submit.prevent="handleLogin" class="space-y-5">

      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">Tenant ID</label>
        <input type="text" x-model="tenantId"
               class="w-full border border-black/[0.06] rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10"
               placeholder="Organisation identifier" />
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">Username</label>
        <input type="text" x-model="username" required
               class="w-full border border-black/[0.06] rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10"
               placeholder="Enter username" />
      </div>

      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1.5">Password</label>
        <input type="password" x-model="password" required
               class="w-full border border-black/[0.06] rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/10"
               placeholder="Enter password" />
      </div>

      <p x-show="errorMessage" x-text="errorMessage"
         class="text-red-600 text-xs"></p>

      <button type="submit" :disabled="loading"
              class="w-full bg-gray-900 text-white text-sm font-medium rounded-lg py-2.5 hover:bg-gray-800 disabled:opacity-50">
        <span x-show="!loading">Authorize Session</span>
        <span x-show="loading">Authenticating…</span>
      </button>
    </form>
  </main>

</body>
</html>
